name: CI-CD Pipeline

on:
push:
branches: [ main ]

jobs:
build-deploy:
runs-on: ubuntu-latest

```
steps:
- name: Checkout
  uses: actions/checkout@v3

- name: Login DockerHub
  run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

- name: Build Image
  run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tracing-app:${{ github.sha }} .

- name: Push Image
  run: docker push ${{ secrets.DOCKER_USERNAME }}/tracing-app:${{ github.sha }}

- name: Setup kubeconfig
  run: |
    mkdir -p $HOME/.kube
    echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

- name: Deploy to Kubernetes
  run: |
    kubectl set image deployment/tracing-app tracing-app=${{ secrets.DOCKER_USERNAME }}/tracing-app:${{ github.sha }}
    kubectl rollout status deployment/tracing-app
```
